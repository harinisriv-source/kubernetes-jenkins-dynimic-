# ============================================================
# Kubernetes Deployment
# Copy to Kubernetes master at: /home/ubuntu/k8s/deployment.yaml
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pip-k8s-deploy
  labels:
    app: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: sri4444/kubernetes:latest   # CHANGE username; Ansible updates tag
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
