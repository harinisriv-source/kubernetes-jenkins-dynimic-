# ============================================================
# Kubernetes Service — exposes the app on port 30080
# Access app at: http://<any-node-ip>:30080
# For cloud providers, change type to: LoadBalancer
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: k8s-svc-pipe
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 8888
